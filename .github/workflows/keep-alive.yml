name: Keep Supabase Awake

on:
  schedule:
    # Runs at 00:00 UTC every single day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to trigger it manually from GitHub if wanted

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -i -X GET "https://udludcngmbcamxosnojs.supabase.co/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
